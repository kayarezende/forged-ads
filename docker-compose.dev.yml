services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://forgedads:devpassword@db:5432/forgedads
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - forgedads

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: forgedads
      POSTGRES_USER: forgedads
      POSTGRES_PASSWORD: devpassword
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forgedads"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - forgedads

volumes:
  pgdata:
  uploads:
  node_modules:
  next_cache:

networks:
  forgedads:
    driver: bridge